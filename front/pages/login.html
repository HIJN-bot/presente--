<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Presente</title>
  <link rel="stylesheet" href="../css/base/styles.css" />
  <style>
    .auth-bg {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
    }

    .auth-header {
      margin-bottom: var(--space-xl);
    }

    .auth-logo {
      font-size: 22px;
      font-weight: 600;
      color: var(--p-text-primary);
      letter-spacing: -0.02em;
      margin-bottom: var(--space-xs);
    }

    .auth-logo span { color: var(--p-blue); }

    .auth-subtitle {
      font-size: 14px;
      color: var(--p-text-muted);
    }

    .form-footer {
      margin-top: var(--space-lg);
      text-align: center;
      font-size: 13px;
      color: var(--p-text-muted);
    }

    .form-footer a {
      color: var(--p-blue);
      font-weight: 500;
    }

    /* Ocultar/mostrar campos por rol */
    .field-teacher { display: none; }
  </style>
</head>
<body>

  <main class="auth-bg">
    <div class="auth-card card">

      <div class="auth-header">
        <p class="auth-logo">Pre<span>sente</span></p>
        <p class="auth-subtitle">Ingresa a tu cuenta para continuar.</p>
      </div>

      <!-- Toggle de rol -->
      <div class="role-toggle" role="group" aria-label="Tipo de usuario">
        <button class="role-toggle-btn active" data-role="student" type="button">Estudiante</button>
        <button class="role-toggle-btn" data-role="teacher" type="button">Docente</button>
      </div>

      <!-- Alerta de error -->
      <div id="login-error" class="alert alert-error hidden" role="alert"></div>

      <!-- Formulario -->
      <form id="login-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="correo@universidad.edu"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <button
          class="btn btn-primary btn-full btn-lg"
          type="submit"
          id="submit-btn"
          data-label="Iniciar sesión"
        >
          Iniciar sesión
        </button>

      </form>

      <p class="form-footer">
        ¿No tienes cuenta?
        <a href="../pages/register.html" id="register-link">Regístrate</a>
      </p>

    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script>
    // Si ya hay sesión, redirigir al dashboard
    if (Auth.isLoggedIn()) Auth.redirectToDashboard();

    const form      = document.getElementById('login-form');
    const errorEl   = document.getElementById('login-error');
    const submitBtn = document.getElementById('submit-btn');
    const regLink   = document.getElementById('register-link');
    const toggleBtns = document.querySelectorAll('.role-toggle-btn');

    let currentRole = 'student';

    // ── Toggle de rol ──────────────────────────────────
    toggleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        toggleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentRole = btn.dataset.role;

        // Actualizar enlace de registro con el mismo rol
        const redirect = Auth.getRedirectParam();
        const base = `./register.html?role=${currentRole}`;
        regLink.href = redirect ? `${base}&redirect=${encodeURIComponent(redirect)}` : base;

        hideError();
      });
    });

    // ── Inicializar enlace de registro ─────────────────
    const redirect = Auth.getRedirectParam();
    regLink.href = redirect
      ? `../pages/register.html?role=${currentRole}&redirect=${encodeURIComponent(redirect)}`
      : `../pages/register.html?role=${currentRole}`;

    // ── Prellenar rol desde URL si viene del QR ────────
    const urlParams = new URLSearchParams(window.location.search);
    const roleParam = urlParams.get('role');
    if (roleParam === 'teacher' || roleParam === 'student') {
      toggleBtns.forEach(b => {
        b.classList.toggle('active', b.dataset.role === roleParam);
      });
      currentRole = roleParam;
    }

    // ── Submit ─────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email    = form.email.value.trim();
      const password = form.password.value;

      if (!email || !password) {
        showError('Completa todos los campos.');
        return;
      }

      setLoading(true);

      const result = await Auth.login({ email, password, role: currentRole });

      if (!result.ok) {
        showError(result.message);
        setLoading(false);
        return;
      }

      // Redirigir al destino original si venía desde el QR, si no al dashboard
      const dest = Auth.getRedirectParam();
      window.location.href = dest ? decodeURIComponent(dest) : (
        currentRole === 'teacher'
          ? '../pages/dashboard/teacher.html'
          : '../pages/dashboard/student.html'
      );
    });

    // ── Helpers ────────────────────────────────────────
    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
    }

    function hideError() {
      errorEl.classList.add('hidden');
      errorEl.textContent = '';
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.textContent = loading ? 'Entrando…' : submitBtn.dataset.label;
    }
  </script>

</body>
</html>
