<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR de clase — Presente</title>
  <link rel="stylesheet" href="../../css/base/styles.css" />
  <style>
    body { background: var(--p-bg); }
    .qr-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .qr-card { width: 100%; max-width: 700px; background: var(--p-surface); border: 1px solid var(--p-border); border-radius: var(--radius-xl); padding: 40px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 24px; }
    .class-name { font-size: 32px; font-weight: 600; color: var(--p-text-primary); letter-spacing: -0.03em; }
    .class-meta { color: var(--p-text-secondary); font-size: 15px; }
    .qr-box { width: 300px; height: 300px; background: white; border-radius: 24px; padding: 20px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--p-border); }
    .qr-box img { width: 100%; height: 100%; object-fit: contain; }
    .qr-placeholder { width: 100%; height: 100%; border-radius: 16px; background: linear-gradient(45deg, #000 25%, transparent 25%), linear-gradient(-45deg, #000 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #000 75%), linear-gradient(-45deg, transparent 75%, #000 75%); background-size: 40px 40px; background-position: 0 0, 0 20px, 20px -20px, -20px 0px; }
    .status-wrap { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .qr-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .instructions { max-width: 480px; color: var(--p-text-muted); font-size: 14px; line-height: 1.6; }
    @media (max-width: 700px) { .qr-card { padding: 28px 20px; } .class-name { font-size: 24px; } .qr-box { width: 240px; height: 240px; } }
  </style>
</head>
<body>
  <main class="qr-screen">
    <section class="qr-card">
      <div>
        <h1 class="class-name" id="class-name">Cargando clase...</h1>
        <p class="class-meta" id="class-date">Cargando horario...</p>
      </div>
      <div class="status-wrap">
        <span class="badge badge-neutral status-dot" id="class-status">Sin estado</span>
      </div>
      <div class="qr-box"><div class="qr-placeholder"></div></div>
      <p class="instructions">Escanea este código QR para registrar tu asistencia automáticamente en la clase.</p>
      <div class="qr-actions">
        <a href="./teacher-class-detail.html?id=1" class="btn btn-secondary" id="back-to-detail">Volver al detalle</a>
        <button class="btn btn-primary" id="refresh-btn">Actualizar QR</button>
      </div>
    </section>
  </main>

  <script src="../../js/auth.js"></script>
  <script>
    Auth.requireAuth();
    if (Auth.getRole() !== 'teacher') {
      window.location.href = './student.html';
    } else {
      loadQr();
    }

    const refreshBtn = document.getElementById('refresh-btn');
    if (refreshBtn) refreshBtn.addEventListener('click', loadQr);

    async function loadQr() {
      const params = new URLSearchParams(window.location.search);
      const classId = params.get('id');
      if (!classId) { window.location.href = './teacher-classes.html'; return; }

      const backToDetail = document.getElementById('back-to-detail');
      if (backToDetail) backToDetail.href = `./teacher-class-detail.html?id=${classId}`;

      if (refreshBtn) { refreshBtn.disabled = true; refreshBtn.textContent = 'Actualizando...'; }

      try {
        const user = Auth.getUser();
        if (!user?.email) throw new Error('No se pudo identificar al docente autenticado.');

        const classesRes = await Auth.authFetch(`/api/clases/consultar?email_docente=${encodeURIComponent(user.email)}`);
        if (!classesRes) return;
        const classes = await classesRes.json();
        if (!classesRes.ok) throw new Error(classes.detail || 'No se pudo cargar la clase.');

        const cls = Array.isArray(classes) ? classes.find(item => String(item.id) === String(classId)) : null;
        if (!cls) throw new Error('La clase no fue encontrada.');

        const qrRes = await Auth.authFetch(`/api/qr?id_clase=${encodeURIComponent(classId)}`);
        if (!qrRes) return;
        const qrData = await qrRes.json();
        if (!qrRes.ok) throw new Error(qrData.detail || 'No se pudo cargar el QR.');

        const className = document.getElementById('class-name');
        const classDate = document.getElementById('class-date');
        const badge = document.getElementById('class-status');
        const qrBox = document.querySelector('.qr-box');

        if (className) className.textContent = cls.materia;
        if (classDate) classDate.textContent = new Date(cls.horario).toLocaleString('es-CO', { dateStyle: 'medium', timeStyle: 'short' });
        if (badge) {
          const status = getClassStatus(cls.horario);
          badge.className = `badge ${status.badgeClass} status-dot`;
          badge.textContent = status.label;
        }
        if (qrBox) {
          qrBox.innerHTML = qrData.imagen_qr
            ? `<img src="data:image/png;base64,${qrData.imagen_qr}" alt="QR de la clase">`
            : '<div class="qr-placeholder"></div>';
        }
      } catch (error) {
        const qrBox = document.querySelector('.qr-box');
        if (qrBox) qrBox.innerHTML = `<div class="alert alert-error">${escapeHtml(error.message || 'No se pudo cargar el QR.')}</div>`;
      } finally {
        if (refreshBtn) { refreshBtn.disabled = false; refreshBtn.textContent = 'Actualizar QR'; }
      }
    }

    function getClassStatus(value) {
      if (!value) return { badgeClass: 'badge-neutral', label: 'Sin fecha' };
      const classDate = new Date(value);
      const now = new Date();
      const diffHours = (classDate.getTime() - now.getTime()) / (1000 * 60 * 60);
      if (diffHours < -2) return { badgeClass: 'badge-expired', label: 'Caducada' };
      if (diffHours < 1) return { badgeClass: 'badge-active', label: 'Activa' };
      return { badgeClass: 'badge-upcoming', label: 'Próxima' };
    }

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value ?? '';
      return div.innerHTML;
    }
  </script>
</body>
</html>
