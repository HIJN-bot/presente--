<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear clase — Presente</title>

  <link rel="stylesheet" href="../../css/base/styles.css" />

  <style>
    .create-layout {
      min-height: 100vh;
      background: var(--p-bg);
    }

    .create-content {
      max-width: 760px;
      margin: 0 auto;
      padding: var(--space-xl) var(--space-lg);
    }

    .page-header-custom {
      margin-bottom: var(--space-xl);
    }

    .page-title {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--p-text-primary);
      margin-bottom: 8px;
    }

    .page-subtitle {
      font-size: 15px;
      color: var(--p-text-secondary);
      max-width: 620px;
      line-height: 1.6;
    }

    .form-card {
      background: var(--p-surface);
      border: 1px solid var(--p-border);
      border-radius: var(--radius-xl);
      padding: 32px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
    }

    .full-width {
      grid-column: span 2;
    }

    .textarea {
      width: 100%;
      min-height: 120px;
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--p-border);
      background: var(--p-surface-2);
      color: var(--p-text-primary);
      font-family: var(--font-main);
      resize: vertical;
      outline: none;
      transition: 0.2s ease;
    }

    .textarea:focus {
      border-color: var(--p-blue);
      box-shadow: var(--shadow-focus);
      background: var(--p-surface);
    }

    .form-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--space-md);
      margin-top: var(--space-xl);
      flex-wrap: wrap;
    }

    .helper-box {
      margin-top: var(--space-lg);
      background: var(--p-blue-pale);
      border-radius: var(--radius-lg);
      padding: 16px;
      color: var(--p-text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }

    .helper-box strong {
      color: var(--p-text-primary);
    }

    @media (max-width: 700px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .full-width {
        grid-column: span 1;
      }

      .form-card {
        padding: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="create-layout">

    <!-- Navbar -->
    <header class="navbar">
      <div class="navbar-inner">

        <a href="./teacher.html" class="navbar-logo">
          Pre<span>sente</span>
        </a>

        <div class="navbar-user">
          <span class="navbar-name" id="navbar-username">
            Docente
          </span>

          <button class="navbar-logout" data-logout>
            Cerrar sesión
          </button>
        </div>

      </div>
    </header>

    <!-- Contenido -->
    <main class="create-content">

      <section class="page-header-custom">

        <h1 class="page-title">
          Crear nueva clase
        </h1>

        <p class="page-subtitle">
          Completa la información de la clase para generar automáticamente el código QR de asistencia.
        </p>

      </section>

      <!-- Formulario -->
      <section class="form-card">

        <div id="create-error" class="alert alert-error hidden"></div>
        <div id="create-success" class="alert alert-success hidden"></div>

        <form id="create-class-form">

          <div class="form-grid">

            <div class="form-group full-width">
              <label class="form-label" for="class_name">
                Nombre de la clase
              </label>

              <input
                class="form-input"
                type="text"
                id="class_name"
                name="class_name"
                placeholder="Ej: Programación Web"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="date">
                Fecha
              </label>

              <input
                class="form-input"
                type="date"
                id="date"
                name="date"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="room">
                Aula
              </label>

              <input
                class="form-input"
                type="text"
                id="room"
                name="room"
                placeholder="Ej: Aula 204"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="start_time">
                Hora inicio
              </label>

              <input
                class="form-input"
                type="time"
                id="start_time"
                name="start_time"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="end_time">
                Hora finalización
              </label>

              <input
                class="form-input"
                type="time"
                id="end_time"
                name="end_time"
                required
              />
            </div>

            <div class="form-group full-width">
              <label class="form-label" for="description">
                Descripción
              </label>

              <textarea
                class="textarea"
                id="description"
                name="description"
                placeholder="Información adicional de la clase..."
              ></textarea>
            </div>

          </div>

          <div class="helper-box">
            <strong>Nota:</strong>
            Cuando el backend esté conectado, esta clase generará automáticamente un código QR para registrar asistencia.
          </div>

          <div class="form-actions">

            <a href="./teacher-classes.html" class="btn btn-secondary">
              Cancelar
            </a>

            <button
              type="submit"
              class="btn btn-primary btn-lg"
              id="submit-btn"
            >
              Crear clase
            </button>

          </div>

        </form>

      </section>

    </main>

  </div>

  <script src="../../js/auth.js"></script>

  <script>

    // Validar sesión
    Auth.requireAuth();

    // Validar rol docente
    if (Auth.getRole() !== 'teacher') {
      window.location.href = '../login.html';
    }

    const form = document.getElementById('create-class-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorBox = document.getElementById('create-error');
    const successBox = document.getElementById('create-success');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      hideMessages();

      const className = form.class_name.value.trim();
      const date = form.date.value;
      const startTime = form.start_time.value;
      const user = Auth.getUser();

      if (!className || !date || !startTime) {
        showError('Completa todos los campos obligatorios.');
        return;
      }

      if (!user?.email) {
        showError('No se pudo identificar al docente autenticado.');
        return;
      }

      setLoading(true);

      try {
        const horario = new Date(`${date}T${startTime}:00`).toISOString();
        const res = await Auth.authFetch(
          `/api/clases/creacion?email_docente=${encodeURIComponent(user.email)}`,
          {
            method: 'POST',
            body: JSON.stringify({
              materia: className,
              horario,
            }),
          }
        );

        if (!res) return;

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || data.message || 'No se pudo crear la clase.');
        }

        showSuccess('Clase creada correctamente.');
        setLoading(false);

        setTimeout(() => {
          window.location.href = './teacher-classes.html';
        }, 1200);

      } catch (error) {
        showError(error.message || 'No se pudo crear la clase.');
        setLoading(false);
      }

    });

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.remove('hidden');
    }

    function showSuccess(message) {
      successBox.textContent = message;
      successBox.classList.remove('hidden');
    }

    function hideMessages() {
      errorBox.classList.add('hidden');
      successBox.classList.add('hidden');
    }

    function setLoading(state) {
      submitBtn.disabled = state;
      submitBtn.textContent = state
        ? 'Creando...'
        : 'Crear clase';
    }

  </script>

</body>
</html>
