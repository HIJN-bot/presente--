<!-- =====================================================
     pages/dashboard/student-class.html
     Detalle de clase del estudiante
     ===================================================== -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Detalle de clase — Presente</title>

  <link rel="stylesheet" href="../../css/base/styles.css" />

  <style>
    .detail-page {
      padding: var(--space-xl) var(--space-lg);
      max-width: 760px;
      margin: 0 auto;
    }

    .detail-card {
      margin-top: var(--space-lg);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--space-md);
      margin-top: var(--space-lg);
    }

    .detail-item {
      background: var(--p-surface-2);
      border: 1px solid var(--p-border);
      border-radius: var(--radius-md);
      padding: var(--space-md);
    }

    .detail-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--p-text-muted);
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 15px;
      font-weight: 500;
      color: var(--p-text-primary);
    }

    .detail-actions {
      margin-top: var(--space-xl);
      display: flex;
      justify-content: flex-start;
    }
  </style>
</head>

<body data-page="student-class">

  <!-- Navbar -->
  <nav class="navbar">

    <div class="navbar-inner">

      <a href="./student.html" class="navbar-logo">
        Pre<span>sente</span>
      </a>

      <div class="navbar-user">
        <span class="navbar-name" id="navbar-username"></span>

        <button
          class="navbar-logout"
          data-logout
        >
          Cerrar sesión
        </button>
      </div>

    </div>

  </nav>

  <!-- Contenido -->
  <main class="detail-page">

    <div class="page-header">

      <div class="page-header-row">

        <div>
          <h1
            class="t-page-title"
            id="class-name"
          >
            Cargando clase...
          </h1>

          <p class="t-meta mt-sm">
            Información de asistencia registrada.
          </p>
        </div>

        <span
          class="badge badge-blue"
          id="attendance-badge"
        >
          Asistencia registrada
        </span>

      </div>

    </div>

    <section class="card detail-card">

      <div class="detail-grid">

        <div class="detail-item">
          <p class="detail-label">Fecha</p>

          <p
            class="detail-value"
            id="class-date"
          >
            —
          </p>
        </div>

        <div class="detail-item">
          <p class="detail-label">Horario</p>

          <p
            class="detail-value"
            id="class-schedule"
          >
            —
          </p>
        </div>

        <div class="detail-item">
          <p class="detail-label">Hora de entrada</p>

          <p
            class="detail-value"
            id="entry-time"
          >
            —
          </p>
        </div>

        <div class="detail-item">
          <p class="detail-label">Docente</p>

          <p
            class="detail-value"
            id="teacher-name"
          >
            —
          </p>
        </div>

      </div>

      <div class="detail-actions">

        <a
          href="./student.html"
          class="btn btn-secondary"
        >
          Volver al panel
        </a>

      </div>

    </section>

  </main>

  <script src="../../js/auth.js"></script>
  <script src="../../js/student.js"></script>

</body>
</html>
