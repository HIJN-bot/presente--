<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presente — Registro de asistencia</title>
  <link rel="stylesheet" href="css\base\styles.css" />
  <style>
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      gap: 12px;
    }

    .hero-logo {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--p-blue);
      margin-bottom: 8px;
    }
    body { background: var(--p-bg); }

    .hero-actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hero-footnote {
      margin-top: 48px;
      font-size: 12px;
      color: var(--p-gray-400);
    }
  </style>
</head>
<body>

  <main class="hero">

    <p class="hero-logo">Presente</p>

    <h1 class="t-hero">Asistencia sin papel,<br>sin complicaciones.</h1>

    <p class="t-body" style="color: var(--p-gray-600); max-width: 400px; margin-top: 8px;">
      El docente muestra un QR. El estudiante lo escanea. La asistencia queda registrada al instante.
    </p>

    <div class="hero-actions">
      <a href="./pages/login.html" class="btn btn-primary btn-lg">Iniciar sesión</a>
      <a href="./pages/register.html" class="btn btn-secondary btn-lg">Registrarse</a>
    </div>

    <p class="hero-footnote">Universidad · Institucional · Seguro</p>

  </main>

  <script src="js\auth.js"></script>
  <script>
    if (Auth.isLoggedIn()) Auth.redirectToDashboard();
  </script>

</body>
</html>
