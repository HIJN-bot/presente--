<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presente - Sistema de Asistencia</title>
    <script>
      // Cargar configuración desde archivo generado por entrypoint.sh (sincrónico)
      try {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', '/config.json', false);
        xhr.send();
        if (xhr.status === 200) {
          const config = JSON.parse(xhr.responseText);
          window.API_BASE_URL = config.API_BASE_URL;
          console.log('API_BASE_URL configurada desde config.json:', window.API_BASE_URL);
        } else {
          throw new Error('Status: ' + xhr.status);
        }
      } catch (err) {
        console.warn('No se pudo cargar config.json, usando fallback localhost:', err);
        window.API_BASE_URL = 'http://localhost:8000';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
